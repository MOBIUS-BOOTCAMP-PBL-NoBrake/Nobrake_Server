spring:
  # 1. H2 Database 설정
  datasource:
    # 인메모리 주소 설정. otadb라는 이름의 DB를 생성합니다.
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # 3. JPA/Hibernate 설정
  jpa:
    hibernate:
      # 서버 시작 시마다 ERD 구조에 맞춰 테이블을 자동으로 생성합니다.
      ddl-auto: create
    show-sql: true # 실행되는 SQL 로그를 콘솔에 출력합니다.
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# 서버 포트 설정 (기본 8080)
server:
  port: 8080