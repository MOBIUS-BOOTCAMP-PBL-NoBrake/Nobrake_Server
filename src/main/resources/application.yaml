spring:
  # 1. H2 Database 설정
  datasource:
    # 인메모리 주소 설정. otadb라는 이름의 DB를 생성합니다.
    url: jdbc:h2:mem:otadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 2. H2 Web Console 설정 (시연 시 브라우저 접속용)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        # 외부(클라우드 배포 시)에서도 콘솔 접속을 허용합니다.
        web-allow-others: true

  # 3. JPA/Hibernate 설정
  jpa:
    hibernate:
      # 서버 시작 시마다 ERD 구조에 맞춰 테이블을 자동으로 생성합니다.
      ddl-auto: create
    show-sql: true # 실행되는 SQL 로그를 콘솔에 출력합니다.
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# 서버 포트 설정 (기본 8080)
server:
  port: 8080